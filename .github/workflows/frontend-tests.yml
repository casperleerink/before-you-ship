name: Frontend Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install

      - name: Lint and format
        run: bun run check

      - name: Typecheck
        run: bun run check-types

      - name: Frontend logic tests
        run: bun run -F web test:logic
